version: 2
updates:
  # GitHub Actions: workflow files under .github/workflows/.
  # Minor + patch updates are batched into one weekly PR; majors land
  # separately so a breaking action upgrade is easy to revert.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Python runtime + dev dependencies (pyproject.toml + requirements-dev.txt).
  # Same grouping policy: minor + patch share one weekly PR, majors split out.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    groups:
      pip-minor-patch:
        update-types:
          - "minor"
          - "patch"
